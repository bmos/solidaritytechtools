repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check
        entry: uv run ruff check --fix
        language: system
        pass_filenames: false
        always_run: true
      - id: ruff-format
        name: ruff format
        entry: uv run ruff format
        language: system
        pass_filenames: false
        always_run: true
      - id: ty
        name: ty check
        entry: uv run ty check
        language: system
        pass_filenames: false
        always_run: true
      - id: forbidden-strings
        name: block forbidden secret strings
        entry: python3 scripts/check_forbidden_strings.py
        language: system

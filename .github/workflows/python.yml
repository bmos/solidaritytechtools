name: Python checks

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main

permissions: read-all

jobs:
  ruff-format:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v8.3.0
        with:
          python-version: 3.14
          activate-environment: true
      - run: uv sync
      - id: run-ruff
        run: >-
          ruff format
          --diff
          .

  ruff-check:
    runs-on: ubuntu-latest
    permissions:
      security-events: write

    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v8.3.0
        with:
          python-version: 3.14
          activate-environment: true
      - run: uv sync
      - id: run-ruff-sarif
        run: >-
          ruff check
          --output-format=sarif
          -o results.sarif
          .
      - uses: github/codeql-action/upload-sarif@v4
        if: ( success() || failure() ) && contains('["success", "failure"]', steps.run-ruff-sarif.outcome)
        with:
          sarif_file: results.sarif
      - id: run-ruff
        if: failure() && contains('["failure"]', steps.run-ruff-sarif.outcome)
        run: >-
          ruff check
          --output-format=github
          .

  ty:
    runs-on: ubuntu-latest
    permissions:
      security-events: write

    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v8.3.0
        with:
          python-version: 3.14
          activate-environment: true
      - run: uv sync
      - id: run-ty
        run: >-
          ty check
          .

  pytest:
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.14"
        os:
          - ubuntu-latest
          - windows-latest
          - macos-latest
        resolution:
          - highest
          - lowest-direct
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v8.3.0
        with:
          python-version: ${{ matrix.python-version }}
          activate-environment: true
      - env:
          UV_RESOLUTION: ${{ matrix.resolution }}
        run: uv sync
      - env:
          COVERAGE_FILE: .coverage
        run: pytest --cov=solidaritytechtools
      - uses: actions/upload-artifact@v7
        with:
          name: coverage-${{ matrix.os }}-${{ matrix.python-version }}-${{ matrix.resolution }}
          path: .coverage.${{ matrix.os }}.${{ matrix.python-version }}.${{ matrix.resolution }}
          include-hidden-files: true

  coverage:
    runs-on: ubuntu-latest
    needs: pytest
    permissions:
      pull-requests: write
      contents: write

    steps:
      - uses: actions/checkout@v7
      - uses: actions/download-artifact@v8
        with:
          pattern: coverage-*
          merge-multiple: true
      - id: coverage_comment
        uses: py-cov-action/python-coverage-comment-action@v4.1
        with:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MERGE_COVERAGE_FILES: true
      - uses: actions/upload-artifact@v7
        if: steps.coverage_comment.outputs.COMMENT_FILE_WRITTEN == 'true'
        with:
          name: python-coverage-comment-action
          path: python-coverage-comment-action.txt

  pre-commit:
    runs-on: ubuntu-latest
    needs:
      - ruff-format
      - ruff-check
      - ty
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v8.3.0
        with:
          python-version: 3.14
          activate-environment: true
      - run: uv sync
      - id: run-pre-commit
        run: >-
          pre-commit run
          --all-files
